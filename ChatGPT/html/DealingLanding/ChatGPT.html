<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChatGPT|File Tracking System</title>
    <link
      rel="stylesheet"
      href="../../css/DealingLanding/ChatGPTDealingLanding.css"
    />
    <script
      src="../../js/DealingLanding/ChatGPTDealingLanding.js"
      defer
    ></script>
  </head>
  <body>
    <div class="container">
      <h1>File Tracking System</h1>

      <!-- SEARCH -->
      <div class="card">
        <h2>Search FR</h2>

        <div class="search-row">
          <input type="text" id="frNo" placeholder="Enter FR Number" />
          <button onclick="searchFR()">Search</button>
        </div>
      </div>

      <!-- FR DETAILS -->
      <div class="card">
        <h2>FR Information</h2>

        <div class="details-grid">
          <div class="field">
            <label>PUC Type</label>
            <input id="pucType" readonly />
          </div>

          <div class="field">
            <label>PUC No</label>
            <input id="pucNo" readonly />
          </div>

          <div class="field">
            <label>FR Date</label>
            <input id="frDate" readonly />
          </div>

          <div class="field">
            <label>PUC Date</label>
            <input id="pucDate" readonly />
          </div>
        </div>
      </div>

      <!-- SECTION -->
      <div class="card">
        <h2>Select Section</h2>

        <select id="sectionSelect">
          <option value="">Select Section</option>
          <option value="Accounts">Accounts</option>
          <option value="Administration">Administration</option>
          <option value="Establishment">Establishment</option>
        </select>
      </div>

      <!-- FILES -->
      <div class="card">
        <h2>Available Files</h2>

        <div id="accordionContainer">Select a section first.</div>
      </div>

      <!-- SELECTED FILE -->
      <div class="card">
        <h2>Selected File</h2>

        <div id="selectedFile" class="selected-file">No file selected</div>
      </div>

      <!-- STATUS -->
      <div class="card">
        <h2>Status</h2>

        <div class="status-container">
          <select id="statusSelect">
            <option value="open">Open</option>
            <option value="partial">Partially Done</option>
            <option value="done">Done</option>
          </select>

          <div class="status">
            <span id="statusDot" class="status-dot open"> </span>

            <span id="statusText"> Open </span>
          </div>
        </div>
      </div>

      <!-- ACTION -->
      <div class="card">
        <h2>Action</h2>
        <div class="accordion-item">
          <div class="accordion-header" id="actionHeader">Select Action</div>
          <div class="accordion-content" id="actionAccordion">
            <div
              class="action-option"
              data-value="For Info"
              style="padding: 10px"
            >
              For Info
            </div>
            <div
              class="action-option"
              data-value="S.O DFA"
              style="padding: 10px"
            >
              S.O DFA
            </div>
            <div
              class="action-option"
              data-value="W.O DFA"
              style="padding: 10px"
            >
              W.O DFA
            </div>
            <div style="padding: 10px">
              <input
                type="text"
                class="action-option"
                id="customAction"
                placeholder="Other Action"
                data-value="Other Action user input"
              />
            </div>
          </div>
        </div>

        <input type="hidden" id="selectedAction" />
      </div>

      <!-- PUT UP DETAILS -->
      <div class="card">
        <h2>Put Up Details</h2>
        <div class="details-grid">
          <div class="field">
            <label>Put Up To</label>
            <input type="text" id="putUpTo" placeholder="Enter officer name" />
          </div>

          <div class="field">
            <label>Put Up Date</label>
            <input type="date" id="putUpDate" />
          </div>
        </div>
      </div>

      <!-- SUBMIT -->
      <div class="card">
        <button id="putUpBtn" class="putup-btn">Put Up</button>
      </div>
    </div>
  </body>
</html>
