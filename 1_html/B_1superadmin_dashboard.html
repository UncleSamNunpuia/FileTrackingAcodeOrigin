<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap demo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../3_CSS/SASS/B_1superadmin_dashboard.css" />
    <!-- <script src="../2_JS/B_authenticatedPages.js" defer></script> -->
  </head>
  <body>
    <!-- main nvabar -->
    <div>
      <header class="topbar">
        <div class="topbar-left">
          <h3 class="system-title">File Tracking System</h3>
        </div>
        <div class="topbar-right">
          <span id="loggedInUser"></span>
          <span id="loggedInRole" class="role-badge"></span>
          <button id="logoutBtn" class="logout-btn">Logout</button>
        </div>
        <!--page heading  -->
        <div>
          <p>superadmin user landing dashboard here</p>
        </div>
      </header>

      <!-- cp form claude html -->
      <div class="page-body">
        <!-- APP LAUNCHERS -->
        <div class="section-hd">Quick Access</div>
        <div class="app-tiles">
          <!-- CREATE USER TILE -->
          <div
            class="app-tile indigo"
            id="tile-user"
            tabindex="0"
            onclick="openUserModal()"
          >
            <!-- onkeydown="if (event.key === 'Enter') launchApp('user');" -->
            <!-- onclick="launchApp('user')" -->
            <div class="tile-icon-wrap">
              <svg
                width="26"
                height="26"
                fill="none"
                viewBox="0 0 24 24"
                stroke="white"
                stroke-width="1.8"
              >
                <path
                  stroke-linecap="round"
                  d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"
                />
                <circle cx="9" cy="7" r="4" />
                <path stroke-linecap="round" d="M19 8v6M22 11h-6" />
              </svg>
            </div>
            <div class="tile-label">Create New User</div>
            <div class="tile-desc">
              Add clerks, admins, or other users to the system and assign their
              access roles.
            </div>
            <div class="tile-action">
              Open App
              <svg
                width="14"
                height="14"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="2.5"
              >
                <path stroke-linecap="round" d="M5 12h14M12 5l7 7-7 7" />
              </svg>
            </div>
          </div>

          <!-- FILE ENTRY TILE -->
          <div
            class="app-tile teal"
            id="tile-file"
            tabindex="0"
            onclick="openFileModal()"
          >
            <!-- onclick="launchApp('file')" -->
            <!-- onkeydown="if (event.key === 'Enter') launchApp('file');" -->
            <div class="tile-icon-wrap">
              <svg
                width="26"
                height="26"
                fill="none"
                viewBox="0 0 24 24"
                stroke="white"
                stroke-width="1.8"
              >
                <path
                  stroke-linecap="round"
                  d="M3 7a2 2 0 012-2h5l2 2h7a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"
                />
                <path stroke-linecap="round" d="M12 11v6M9 14h6" />
              </svg>
            </div>
            <div class="tile-label">Enter File Number & Name</div>
            <div class="tile-desc">
              Register a new file into the system with its number, name, and
              section details.
            </div>
            <div class="tile-action">
              Open App
              <svg
                width="14"
                height="14"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="2.5"
              >
                <path stroke-linecap="round" d="M5 12h14M12 5l7 7-7 7" />
              </svg>
            </div>
          </div>
        </div>
      </div>

      <!-- This part is where the modal pop up should appear -->
      <div class="modal-overlay" id="modalOverlay">
        <div class="modal-card" id="modalCard"></div>
      </div>
    </div>
    <!-- import bootstrap js -->
    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
      integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
      integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
      crossorigin="anonymous"
    ></script>
    <script src="../2_JS/B_1superadmin_dashboard.js" defer></script>
  </body>
</html>
